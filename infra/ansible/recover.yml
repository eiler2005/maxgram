---
# Восстановить bridge на пустом VM из локального tar-архива.
# Pre-condition:
#   - VM прошла bootstrap.yml (есть user `deploy`, Docker, /opt/maxtg-bridge пустой)
#   - локально есть архив, путь передан через -e backup_archive=...
# Усиление безопасности: проверяем что project_root пустой — чтобы случайно
# не перезаписать живой prod.
#
# Запуск:
#   ansible-playbook recover.yml -e backup_archive=backups/maxtg-backup-prod-20260424T120000.tgz

- name: Recover MAX→Telegram Bridge from backup
  hosts: bridge_servers
  gather_facts: true
  become: false

  pre_tasks:
    - name: Validate backup_archive variable was provided
      ansible.builtin.fail:
        msg: |
          Не передан backup_archive. Запускай:
            ansible-playbook recover.yml -e backup_archive=path/to/archive.tgz
      when: backup_archive is not defined or backup_archive | length == 0

    - name: Resolve absolute backup archive path on local machine
      ansible.builtin.set_fact:
        backup_archive_abs: "{{ backup_archive | realpath }}"
      delegate_to: localhost
      become: false

    - name: Verify local backup archive exists
      ansible.builtin.stat:
        path: "{{ backup_archive_abs }}"
      register: backup_archive_stat
      delegate_to: localhost
      become: false

    - name: Fail if local backup archive is missing
      ansible.builtin.fail:
        msg: "Архив {{ backup_archive_abs }} не найден на локальной машине."
      when: not backup_archive_stat.stat.exists

    - name: Verify project_root exists on server
      ansible.builtin.stat:
        path: "{{ project_root }}"
      register: recover_project_root_stat

    - name: Fail if project_root does not exist
      ansible.builtin.fail:
        msg: |
          {{ project_root }} отсутствует. Сначала запусти bootstrap.yml на новом VM.
      when: not recover_project_root_stat.stat.exists

    - name: List top-level project_root entries
      ansible.builtin.find:
        paths:
          - "{{ project_root }}"
        file_type: any
        recurse: false
        hidden: true
      register: recover_project_root_entries

    - name: Fail if project_root contains anything except an empty data directory
      ansible.builtin.fail:
        msg: |
          {{ project_root }} не выглядит пустым staging-каталогом для recovery.
          recover.yml разрешает только пустой project_root или bootstrap-created empty {{ data_dir }}/.
          Лишние entries:
          {{
            recover_project_root_entries.files
            | map(attribute='path')
            | reject('equalto', project_root ~ '/' ~ data_dir)
            | list
          }}
      when: >-
        (
          recover_project_root_entries.files
          | map(attribute='path')
          | reject('equalto', project_root ~ '/' ~ data_dir)
          | list
          | length
        ) > 0

    - name: Inspect data directory before recovery
      ansible.builtin.find:
        paths:
          - "{{ project_root }}/{{ data_dir }}"
        file_type: any
        recurse: true
        hidden: true
      register: recover_data_dir_entries
      when: >
        recover_project_root_entries.files
        | map(attribute='path')
        | select('equalto', project_root ~ '/' ~ data_dir)
        | list
        | length > 0

    - name: Fail if bootstrap-created data directory is not empty
      ansible.builtin.fail:
        msg: |
          {{ project_root }}/{{ data_dir }} уже содержит файлы.
          recover.yml отказывается смешивать recovery-архив с существующим state.
          Очисти каталог вручную или используй новый VM.
      when:
        - recover_data_dir_entries is defined
        - recover_data_dir_entries.matched | int > 0

  tasks:
    - name: Define remote archive path
      ansible.builtin.set_fact:
        recover_remote_archive: "/tmp/maxtg-recover-{{ ansible_date_time.iso8601_basic_short }}.tgz"

    - name: Copy backup archive to server
      ansible.builtin.copy:
        src: "{{ backup_archive_abs }}"
        dest: "{{ recover_remote_archive }}"
        mode: "0600"

    - name: Extract archive into project_root
      ansible.builtin.unarchive:
        src: "{{ recover_remote_archive }}"
        dest: "{{ project_root }}"
        remote_src: true

    - name: Set restrictive permissions on env files
      ansible.builtin.file:
        path: "{{ project_root }}/{{ item }}"
        mode: "0600"
      loop:
        - "{{ env_file }}"
        - "{{ env_secrets_file }}"
        - "{{ env_host_file }}"
        - "{{ config_local_file }}"

    - name: Set permissions on data directory
      ansible.builtin.file:
        path: "{{ project_root }}/{{ data_dir }}"
        state: directory
        mode: "0700"

    - name: Remove temporary archive from server
      ansible.builtin.file:
        path: "{{ recover_remote_archive }}"
        state: absent

  post_tasks:
    - name: Run deploy (sync code + start + verify)
      ansible.builtin.import_role:
        name: bridge_app
