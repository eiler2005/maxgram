services:
  bridge:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: maxtg-bridge:prod
    env_file:
      - ../.env
    environment:
      CONFIG_PATH: /app/config.yaml
      CONFIG_LOCAL_PATH: /app/config.local.yaml
      DATA_DIR: /app/data
      PYTHONUNBUFFERED: "1"
    user: "${APP_UID:-1000}:${APP_GID:-1000}"
    restart: unless-stopped
    stop_grace_period: 30s
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=64m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 256
    mem_limit: 256m
    volumes:
      - ../data:/app/data
      - ../config.yaml:/app/config.yaml:ro
      - ../config.local.yaml:/app/config.local.yaml:ro
    # Bridge не принимает входящие подключения; порты наружу не публикуем.

